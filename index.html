<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Camera Test</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f0f0f0;
    }
    video {
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>📷 Camera Test</h2>

<video id="video" autoplay playsinline></video><br>

<button onclick="startCamera()">Start Camera</button>

<script>
function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    document.getElementById("video").srcObject = stream;
  })
  .catch(err => {
    alert("Cannot access camera: " + err);
  });
}
</script>

</body>
</html>
